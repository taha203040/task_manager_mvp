services:
  nginx:
    image: nginx:alpine
    container_name: nginx_gw
    ports:
      - '80:80'
    volumes:
      - ./gateway/etc/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - client
      - server
    networks:
      - app-network
  client:
    build: ./client
    volumes:
      - ./client:/app  # Fixed: Mount to consistent path, not root
      - /app/node_modules  # Fixed: Anonymous volume to prevent host overwrite
    ports:
      - "3000:3000"
    command: npm run dev
    container_name: client
    working_dir: /app  # Added: Ensure commands run in correct directory
    develop:
      watch:
        - path: ./client
          action: sync
          target: /app  # Fixed: Target should match container path
        - path: ./client/package*.json
          action: rebuild
    networks:
      - app-network
  server:
    build: ./server
    volumes:
      - ./server:/app  # Fixed: Mount to consistent path, not root
      - /app/node_modules  # Fixed: Anonymous volume to prevent host overwrite
    container_name: server
    ports:
      - "4000:4000"
    command: npm run dev
    working_dir: /app  # Added: Ensure commands run in correct directory
    develop:
      watch:
      - path: ./server/src
        action: sync
        target: /app/src  # Fixed: Target should be specific subdirectory
      - path: ./server/package*.json
        action: rebuild
    networks:
      - app-network
networks:
  app-network:
    driver: bridge
